<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEPI - Calculadora de Médias</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0048FE;
            --dark-blue: #003399;
            --bg-color: #eef2f6;
            --text-dark: #181d27;
            --text-muted: #334155;
            --card-bg: #ffffff;
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background-color: var(--dark-blue);
            padding: 2rem;
            text-align: center;
            color: #fff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 300;
        }

        /* Main Content */
        .container {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 1.5rem;
            flex-grow: 1;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Cards */
        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-top: 4px solid var(--primary-blue);
            transition: var(--transition);
        }

        .card:hover {
            box-shadow: 0 8px 25px rgba(0, 72, 254, 0.15);
        }

        .card h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            color: var(--dark-blue);
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 0.5rem;
        }

        .card h3 {
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 1rem;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            background-color: #f8fafc;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(0, 72, 254, 0.1);
            background-color: #fff;
        }

        .breakdown {
            margin-top: 1rem;
            padding: 1rem;
            background-color: #f1f5f9;
            border-radius: 8px;
            border-left: 3px solid var(--primary-blue);
        }

        .breakdown-item {
            margin-bottom: 0.75rem;
        }
        
        .breakdown-item:last-child {
            margin-bottom: 0;
        }
        
        .breakdown-item label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .breakdown-item input {
            padding: 0.5rem;
            font-size: 0.95rem;
        }

        /* Results */
        .result {
            margin-top: 1rem;
            padding: 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }

        .result.aprovado {
            display: block;
            background-color: #dcfce7;
            color: #166534;
            border-left: 4px solid #16a34a;
        }

        .result.reprovado {
            display: block;
            background-color: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #dc2626;
        }

        .result.recuperacao {
            display: block;
            background-color: #fef9c3;
            color: #854d0e;
            border-left: 4px solid #eab308;
        }

        .result p {
            margin-bottom: 0.5rem;
        }
        
        .result p:last-child {
            margin-bottom: 0;
            font-size: 1.1rem;
        }


        /* Footer */
        footer {
            background-color: var(--text-dark);
            color: #94a3b8;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.9rem;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header>
        <h1>FEPI - Centro Universitário</h1>
        <p>Calculadora de Médias Semestrais</p>
    </header>

    <div class="container">
        <div class="dashboard-grid">
            
            <!-- Entrada de Notas -->
            <div class="card">
                <h2><i class="fa-solid fa-calculator"></i> Notas</h2>
                
                <div class="input-group">
                    <label for="b1">1º Bimestre (Total):</label>
                    <input type="number" step="0.01" max="100" id="b1" placeholder="Nota de 0 a 100">
                    
                    <details class="breakdown">
                        <summary style="cursor: pointer; color: var(--primary-blue); font-weight: 500; font-size: 0.9rem;">
                            <i class="fa-solid fa-list-ul"></i> Detalhar notas do 1º Bimestre
                        </summary>
                        <div style="margin-top: 1rem;">
                            <div class="breakdown-item">
                                <label>Coordenação/Oficinas (Máx 5):</label>
                                <input type="number" step="0.01" max="5" id="b1_coord" oninput="somarBimestre('b1')">
                            </div>
                            <div class="breakdown-item">
                                <label>Atividades em sala (Máx 35):</label>
                                <input type="number" step="0.01" max="35" id="b1_ativ" oninput="somarBimestre('b1')">
                            </div>
                            <div class="breakdown-item">
                                <label>Prova Bimestral (Máx 60):</label>
                                <input type="number" step="0.01" max="60" id="b1_prova" oninput="somarBimestre('b1')">
                            </div>
                        </div>
                    </details>
                </div>

                <div class="input-group">
                    <label for="b2">2º Bimestre (Total):</label>
                    <input type="number" step="0.01" max="100" id="b2" placeholder="Nota de 0 a 100">
                    
                    <details class="breakdown">
                        <summary style="cursor: pointer; color: var(--primary-blue); font-weight: 500; font-size: 0.9rem;">
                            <i class="fa-solid fa-list-ul"></i> Detalhar notas do 2º Bimestre
                        </summary>
                        <div style="margin-top: 1rem;">
                            <div class="breakdown-item">
                                <label>Coordenação/Oficinas (Máx 5):</label>
                                <input type="number" step="0.01" max="5" id="b2_coord" oninput="somarBimestre('b2')">
                            </div>
                            <div class="breakdown-item">
                                <label>Atividades em sala (Máx 35):</label>
                                <input type="number" step="0.01" max="35" id="b2_ativ" oninput="somarBimestre('b2')">
                            </div>
                            <div class="breakdown-item">
                                <label>Prova Bimestral (Máx 60):</label>
                                <input type="number" step="0.01" max="60" id="b2_prova" oninput="somarBimestre('b2')">
                            </div>
                        </div>
                    </details>
                </div>

                <div class="input-group">
                    <label for="rec">Recuperação:</label>
                    <input type="number" step="0.01" max="100" id="rec" placeholder="Nota de 0 a 100">
                </div>
                
                <div id="resultado" class="result">Preencha as notas para ver o resultado.</div>
            </div>

        </div>
    </div>

    <footer>
        <p>&copy; 2026 FEPI - Centro Universitário. Todos os direitos reservados.</p>
    </footer>

    <script>
    const mainInputs = ['b1', 'b2', 'rec'];
    mainInputs.forEach(id => {
        document.getElementById(id).addEventListener('input', calcular);
    });

    function limitar(valor, max = 100) {
        if (valor > max) return max;
        if (valor < 0) return 0;
        return valor;
    }

    function somarBimestre(bim) {
        const coord = limitar(parseFloat(document.getElementById(`${bim}_coord`).value) || 0, 5);
        const ativ = limitar(parseFloat(document.getElementById(`${bim}_ativ`).value) || 0, 35);
        const prova = limitar(parseFloat(document.getElementById(`${bim}_prova`).value) || 0, 60);

        // Update the restricted inputs so user sees the max capped values if they typed over
        if (document.getElementById(`${bim}_coord`).value !== '') document.getElementById(`${bim}_coord`).value = coord;
        if (document.getElementById(`${bim}_ativ`).value !== '') document.getElementById(`${bim}_ativ`).value = ativ;
        if (document.getElementById(`${bim}_prova`).value !== '') document.getElementById(`${bim}_prova`).value = prova;

        const total = (coord + ativ + prova).toFixed(2);
        
        const mainInput = document.getElementById(bim);
        mainInput.value = parseFloat(total) > 0 ? parseFloat(total) : '';
        
        // Disparar o cálculo geral manualmente pois mudamos via JS
        calcular();
    }

    function calcular() {
        let b1 = limitar(parseFloat(document.getElementById('b1').value) || 0, 100);
        let b2 = limitar(parseFloat(document.getElementById('b2').value) || 0, 100);
        let rec = limitar(parseFloat(document.getElementById('rec').value) || 0, 100);

        document.getElementById('b1').value = b1 || '';
        document.getElementById('b2').value = b2 || '';
        document.getElementById('rec').value = rec || '';

        let resultado = "";
        let classe = "";

        let necessario_b2 = null;
        let media_semestral = null;
        let necessario_rec = null;
        let media_final = null;
        let msg = "";

        // Se só tem B1 preenchido, calcula quanto precisa no B2
        if (b1 > 0 && b2 === 0 && rec === 0) {
            // Formula original: media = ((b1 * 2) + (b2 * 3)) / 5
            // Queremos media = 70. Entao: 70 * 5 = (b1 * 2) + (b2 * 3)
            // b2 = ((70 * 5) - (b1 * 2)) / 3
            necessario_b2 = ((70 * 5) - (b1 * 2)) / 3;
            resultado += `<p>Precisa no 2º Bimestre: <strong>${necessario_b2.toFixed(2)}</strong></p>`;
            classe = "recuperacao";
        }

        // Se tem B1 e B2 preenchidos
        if (b1 > 0 && b2 > 0) {
            media_semestral = ((b1 * 2) + (b2 * 3)) / 5;
            resultado += `<p>Média Semestral: <strong>${media_semestral.toFixed(2)}</strong></p>`;

            if (media_semestral >= 70) {
                msg = "Aprovado direto!";
                classe = "aprovado";
            } else {
                msg = "Em Recuperação";
                classe = "recuperacao";
                // Formula recuperacao original: ((50 * 5) - (media_semestral * 2)) / 3
                necessario_rec = ((50 * 5) - (media_semestral * 2)) / 3;
                if (necessario_rec < 0) necessario_rec = 0;
                if (necessario_rec > 100) {
                     resultado += `<p>Precisa na Recuperação: <strong>Impossível atingir matematicamente</strong></p>`;
                } else {
                     resultado += `<p>Precisa na Recuperação: <strong>${necessario_rec.toFixed(2)}</strong></p>`;
                }
            }
        }

        // Se tem Recuperacao
        if (media_semestral !== null && rec > 0) {
            media_final = ((media_semestral * 2) + (rec * 3)) / 5;
            
            // Re-escrever o resultado para focar no final
            resultado = `<p>Média Semestral: <strong>${media_semestral.toFixed(2)}</strong></p>`;
            resultado += `<p>Média Final: <strong>${media_final.toFixed(2)}</strong></p>`;

            if (media_final >= 50) {
                msg = "Aprovado após Recuperação!";
                classe = "aprovado";
            } else {
                msg = "Reprovado";
                classe = "reprovado";
            }
        }

        if (msg) resultado += `<p><strong><i class="fa-solid fa-circle-info"></i> ${msg}</strong></p>`;

        const box = document.getElementById('resultado');
        
        if (b1 === 0 && b2 === 0 && rec === 0) {
            box.style.display = 'none';
        } else {
            box.style.display = 'block';
            box.className = 'result ' + classe;
            box.innerHTML = resultado;
        }
    }
    </script>

</body>
</html>
