<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Médias FEPI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0"></script>
<style>
body { font-family: Arial; max-width: 900px; margin: auto; padding: 10px; }
input { width: 100%; padding: 10px; margin: 5px 0; font-size: 16px; }
.result { margin-top: 20px; padding: 15px; border-radius: 10px; }
.aprovado { background: #d4edda; }
.reprovado { background: #f8d7da; }
.recuperacao { background: #fff3cd; }
canvas { margin-top: 20px; }
.history { margin-top: 20px; }
.card { background: #f2f2f2; padding: 10px; margin: 5px 0; border-radius: 8px; }
</style>
</head>
<body>

<h2>Calculadora de Médias FEPI</h2>

<div>
    <label>1º Bimestre:</label>
    <input type="number" step="0.01" max="100" id="b1">

    <label>2º Bimestre:</label>
    <input type="number" step="0.01" max="100" id="b2">

    <label>Recuperação:</label>
    <input type="number" step="0.01" max="100" id="rec">
</div>

<div id="resultado" class="result"></div>

<canvas id="grafico"></canvas>

<div class="history" hidden>
<h3>Histórico</h3>
<div id="historico"></div>
</div>

<script>
let chart;

const inputs = ['b1','b2','rec'];
inputs.forEach(id => {
    document.getElementById(id).addEventListener('input', calcular);
});

function limitar(valor) {
    if (valor > 100) return 100;
    if (valor < 0) return 0;
    return valor;
}

function calcular() {
    let b1 = limitar(parseFloat(document.getElementById('b1').value) || 0);
    let b2 = limitar(parseFloat(document.getElementById('b2').value) || 0);
    let rec = limitar(parseFloat(document.getElementById('rec').value) || 0);

    document.getElementById('b1').value = b1 || '';
    document.getElementById('b2').value = b2 || '';
    document.getElementById('rec').value = rec || '';

    let resultado = "";
    let classe = "";

    let necessario_b2 = null;
    let media_semestral = null;
    let necessario_rec = null;
    let media_final = null;
    let msg = "";

    if (b1 > 0) {
        necessario_b2 = ((70 * 5) - (b1 * 2)) / 3;
        resultado += `<p>Precisa no 2º bim: <strong>${necessario_b2.toFixed(2)}</strong></p>`;
    }

    if (b1 > 0 && b2 > 0) {
        media_semestral = ((b1 * 2) + (b2 * 3)) / 5;
        resultado += `<p>Média Semestral: <strong>${media_semestral.toFixed(2)}</strong></p>`;

        if (media_semestral >= 70) {
            msg = "Aprovado direto";
            classe = "aprovado";
        } else {
            msg = "Recuperação";
            classe = "recuperacao";
            necessario_rec = ((50 * 5) - (media_semestral * 2)) / 3;
            resultado += `<p>Precisa na recuperação: <strong>${necessario_rec.toFixed(2)}</strong></p>`;
        }
    }

    if (media_semestral !== null && rec > 0) {
        media_final = ((media_semestral * 2) + (rec * 3)) / 5;
        resultado += `<p>Média Final: <strong>${media_final.toFixed(2)}</strong></p>`;

        if (media_final >= 50) {
            msg = "Aprovado após recuperação";
            classe = "aprovado";
        } else {
            msg = "Reprovado";
            classe = "reprovado";
        }
    }

    if (msg) resultado += `<p><strong>${msg}</strong></p>`;

    const box = document.getElementById('resultado');
    box.className = 'result ' + classe;
    box.innerHTML = resultado;

    atualizarGrafico(b1, b2, rec, media_semestral, media_final);
    salvarHistorico(b1, b2, rec, media_final, msg);
}

function atualizarGrafico(b1, b2, rec, ms, mf) {
    const ctx = document.getElementById('grafico').getContext('2d');

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['B1','B2','Rec','Sem','Final'],
            datasets: [{
                label: 'Notas',
                data: [b1, b2, rec, ms || 0, mf || 0]
            }]
        },
        options: {
            plugins: {
                annotation: {
                    annotations: {
                        linha70: {
                            type: 'line',
                            yMin: 70,
                            yMax: 70
                        },
                        linha50: {
                            type: 'line',
                            yMin: 50,
                            yMax: 50
                        }
                    }
                }
            },
            scales: {
                y: { beginAtZero: true, max: 100 }
            }
        }
    });
}

function salvarHistorico(b1, b2, rec, mf, status) {
    if (!mf) return;

    let hist = JSON.parse(localStorage.getItem('historico') || '[]');

    hist.unshift({ b1, b2, rec, mf, status, data: new Date().toLocaleString() });
    hist = hist.slice(0, 10);

    localStorage.setItem('historico', JSON.stringify(hist));
    renderHistorico();
}

function renderHistorico() {
    let hist = JSON.parse(localStorage.getItem('historico') || '[]');
    let html = '';

    hist.forEach(item => {
        html += `<div class="card">
        ${item.data}<br>
        B1:${item.b1} B2:${item.b2} Rec:${item.rec}<br>
        Final:${item.mf?.toFixed(2)} - ${item.status}
        </div>`;
    });

    document.getElementById('historico').innerHTML = html;
}

renderHistorico();
</script>

</body>
</html>
